<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imposteur</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111827;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .box {
      width: 100%;
      max-width: 390px;
      background: #1f2937;
      padding: 24px;
      border-radius: 22px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45);
    }

    h1, h2, p {
      text-align: center;
    }

    input, button {
      width: 100%;
      min-height: 52px;
      margin-top: 12px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
    }

    input {
      background: #f9fafb;
      color: #111827;
    }

    button {
      background: #7c3aed;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #374151;
    }

    .hidden {
      display: none;
    }

    .role {
      margin-top: 20px;
      padding: 22px;
      border-radius: 18px;
      background: black;
      font-size: 26px;
      text-align: center;
      font-weight: bold;
    }

    .players {
      margin-top: 16px;
      padding: 14px;
      background: #111827;
      border-radius: 16px;
    }

    #msg {
      color: #facc15;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Imposteur</h1>

    <div id="home">
      <input id="name" placeholder="Ton pseudo">

      <button onclick="showCreate()">Créer un salon</button>
      <button class="secondary" onclick="showJoin()">Rejoindre un salon</button>
    </div>

    <div id="createBox" class="hidden">
      <input id="maxPlayers" type="number" min="3" max="20" placeholder="Nombre de joueurs">
      <button onclick="createRoom()">Valider</button>
      <button class="secondary" onclick="backHome()">Retour</button>
    </div>

    <div id="joinBox" class="hidden">
      <input id="roomCodeInput" placeholder="Code du salon">
      <button onclick="joinRoom()">Rejoindre</button>
      <button class="secondary" onclick="backHome()">Retour</button>
    </div>

    <div id="roomBox" class="hidden">
      <h2 id="roomCode"></h2>

      <div class="role" id="roleText">
        En attente...
      </div>

      <div class="players">
        <strong>Joueurs :</strong>
        <ul id="playersList"></ul>
      </div>
    </div>

    <p id="msg"></p>
  </div>

  <script src="/socket.io/socket.io.js"></script>

  <script>
    const socket = io();

    function getPseudo() {
      return document.getElementById("name").value.trim();
    }

    function showCreate() {
      if (!getPseudo()) {
        showMsg("Entre d'abord ton pseudo.");
        return;
      }

      hideAll();
      document.getElementById("createBox").classList.remove("hidden");
    }

    function showJoin() {
      if (!getPseudo()) {
        showMsg("Entre d'abord ton pseudo.");
        return;
      }

      hideAll();
      document.getElementById("joinBox").classList.remove("hidden");
    }

    function backHome() {
      hideAll();
      document.getElementById("home").classList.remove("hidden");
      showMsg("");
    }

    function hideAll() {
      document.getElementById("home").classList.add("hidden");
      document.getElementById("createBox").classList.add("hidden");
      document.getElementById("joinBox").classList.add("hidden");
      document.getElementById("roomBox").classList.add("hidden");
    }

    function createRoom() {
      const name = getPseudo();
      const maxPlayers = document.getElementById("maxPlayers").value;

      socket.emit("createRoom", {
        name: name,
        maxPlayers: maxPlayers
      });
    }

    function joinRoom() {
      const name = getPseudo();
      const code = document.getElementById("roomCodeInput").value.trim();

      socket.emit("joinRoom", {
        name: name,
        code: code
      });
    }

    function showMsg(text) {
      document.getElementById("msg").textContent = text;
    }

    socket.on("roomUpdate", function (data) {
      hideAll();

      document.getElementById("roomBox").classList.remove("hidden");
      document.getElementById("roomCode").textContent = "Salon : " + data.code;
      document.getElementById("roleText").textContent = data.role;

      const list = document.getElementById("playersList");
      list.innerHTML = "";

      data.players.forEach(function (player) {
        const li = document.createElement("li");
        li.textContent = player;
        list.appendChild(li);
      });

      showMsg(data.players.length + " / " + data.maxPlayers + " joueurs");
    });

    socket.on("errorMsg", function (message) {
      showMsg(message);
    });
  </script>
</body>
</html>
